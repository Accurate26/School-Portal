<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="resultbkg">
        <div class="resultctn">
            <div class="resultcard">
                <div class="logo">
                    <img src="ei_1763096957655-removebg-preview.png">
                    <span>The Bliss College Of<br>Technology Abeokuta</span>
                </div>
                
            </div>

            <div class="header">
                <h1>Student Result Portal</h1>
                <p>First Semester Result</p>
            </div>

            <img id="passport" alt="Student Passport">

            <h2 id="fullName"></h2>

            <div class="student-info">

            <div class="info-box">
                <strong>Name:</strong>
                <span id="name"></span>
            </div>

            <div class="info-box">
                <strong>Matric No:</strong>
                <span id="matricNo"></span>
            </div>

            
   
            <div class="info-box">
                <strong>Department:</strong>
                <span id="department"></span>
            </div>

            <div class="info-box">
                <strong>Level:</strong>
                <span id="level"></span>
            </div>

                

                <table>

                    <thead>
                        <tr>
                            <th>S/N</th>
                            <th>Course Code</th>
                            <th>Course Title</th>
                            <th>Unit</th>
                            <th>Score</th>
                            <th>Grade</th>
                        </tr>
                    </thead>

                    <tbody id="resultTable">

                    </tbody>

                </table>

                <div class="summary">

                    <div class="card">
                        <h3>Total Units</h3>
                        <p id="totalUnits">0</p>
                    </div>

                    <div class="card">
                        <h3>CGPA</h3>
                        <p id="cgpa">0.00</p>
                    </div>

                </div>

            </div>


            <button class="download-button" onclick="window.download()">Download Result</button>

        </div>
    
    </div>

    <script src="config.js"></script>
    <script>
        const student =
        JSON.parse(
            localStorage.getItem("currentStudent")
        );

            document.getElementById("passport").src =
        student.passport;

        document.getElementById("fullName").textContent =
        `${student.firstName} ${student.middleName} ${student.surname}`;


        if(!student){

            window.location.href = "login.html";

        }

        // Student Biodata

        document.getElementById("name").textContent =
        `${student.firstName} ${student.surname}`;

        document.getElementById("matricNo").textContent =
        student.matricNo;

        document.getElementById("department").textContent =
        student.department;

        document.getElementById("level").textContent =
        student.level;

        document.getElementById("cgpa").textContent =
        student.cgpa;

        // Results

        const resultTable =
        document.getElementById("resultTable");

        let totalUnits = 0;

        student.courses.forEach((course,index)=>{

            totalUnits += course.unit;

            resultTable.innerHTML += `

                <tr>

                    <td>${index + 1}</td>

                    <td>${course.code}</td>

                    <td>${course.title}</td>

                    <td>${course.unit}</td>

                    <td>${course.score}</td>

                    <td>${course.grade}</td>

                </tr>

            `;

        });

        document.getElementById("totalUnits")
        .textContent = totalUnits;
    </script>

</body>
</html>
