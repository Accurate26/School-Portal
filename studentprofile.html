<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="container-bkg">
        <div class="profile-card">
            <div class="logo">
                <img src="ei_1763096957655-removebg-preview.png" alt="Logo" class="logo">
                <span>The Bliss College Of<br>Technology Abeokuta</span>
            </div>

            <h1>Student Profile</h1>
            
            
            <div class="profile-container">

                <img id="passport" alt="Student Passport">

                <h2 id="fullName"></h2>

                <p><strong>Student ID:</strong> <span id="studentId"></span></p>
                <p><strong>Matric No:</strong> <span id="matricNo"></span></p>
                <p><strong>Gender:</strong> <span id="gender"></span></p>
                <p><strong>Age:</strong> <span id="age"></span></p>
                <p><strong>Email:</strong> <span id="email"></span></p>
                <p><strong>Phone:</strong> <span id="phone"></span></p>
                <p><strong>State:</strong> <span id="state"></span></p>
                <p><strong>Faculty:</strong> <span id="faculty"></span></p>
                <p><strong>Department:</strong> <span id="department"></span></p>
                <p><strong>Level:</strong> <span id="level"></span></p>
                <p><strong>Session:</strong> <span id="session"></span></p>
                <p><strong>CGPA:</strong> <span id="cgpa"></span></p>
                 
                

                <h3>Registered Courses</h3>

                <table>
                    <thead>
                        <tr>
                            <th>S/N</th>
                            <th>Course Code</th>
                            <th>Course Title</th>
                            <th>Course Unit</th>
                        </tr>
                    </thead>

                    <tbody id="coursesTable">
                    </tbody>

                    <tfoot>
                        <tr>
                            <td colspan="3"><strong>Total Units</strong></td>
                            <td id="totalUnits"></td>
                        </tr>
                    </tfoot>
                </table>

            </div>

            <div class="button-container">
                <button>Download</button>
                <button onclick="window.location.href='portal.html'">Back to Portal</button>
            </div>
    
    
        </div>

    </div> 

    <script src="config.js"></script>
    <script>
    const student =
    JSON.parse(
        localStorage.getItem("currentStudent")
    );

    if(!student){

        window.location.href = "index.html";

    }

    // Biodata

    document.getElementById("passport").src =
    student.passport;

    document.getElementById("fullName").textContent =
    `${student.firstName} ${student.middleName} ${student.surname}`;

    document.getElementById("studentId").textContent =
    student.studentId;

    document.getElementById("matricNo").textContent =
    student.matricNo;

    document.getElementById("gender").textContent =
    student.gender;

    document.getElementById("age").textContent =
    student.age;

    document.getElementById("email").textContent =
    student.email;

    document.getElementById("phone").textContent =
    student.phone;

    document.getElementById("state").textContent =
    student.stateOfOrigin;

    document.getElementById("faculty").textContent =
    student.faculty;

    document.getElementById("department").textContent =
    student.department;

    document.getElementById("level").textContent =
    student.level;

    document.getElementById("session").textContent =
    student.session;

    document.getElementById("cgpa").textContent =
    student.cgpa;



        const coursesTable = document.getElementById("coursesTable");

        let totalUnits = 0;

        student.courses.forEach((course, index) => {

            totalUnits += course.unit;

            coursesTable.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${course.code}</td>
                    <td>${course.title}</td>
                    <td>${course.unit}</td>
                </tr>
            `;

        });

        document.getElementById("totalUnits").textContent = totalUnits;
    </script>
</body>
</html>
