<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lora:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="container">
        <div class="portalbox">
            <div class="logo">
                <img src="ei_1763096957655-removebg-preview.png">
                <span>The Bliss College Of<br>Technology Abeokuta</span>
            </div>

            <div class="welcome">
                <img id='studentImg'  src="user image.jpg" alt="">
                <div class="welcome-text">
                    <h2 id="studentName">Welcome, [Student Name]!</h2>
                    <h4 id="studentId">Your Student ID: [Student ID]</h4>
                </div>
            </div>

            <div class="portal-form">
                <h1>You Are Welcome To Your Portal!</h1>
                <h4>Here you can edit your profile,view your results, register for courses and make payments.</h4>
                <div class="portalbtn">
                    <a href="studentprofile.html">View Profile</a>
                    <a href="coursereg.html">Register For Courses</a>
                    <a href="resultpage.html">View Results</a>
                    <a href="make_payments.html">Make Payments</a>
                    
                </div>

                <h4></h4>
            </div>
        </div>

    </div>


    <script>
        const students =
            JSON.parse(
                localStorage.getItem("students")
            ) || [];

        const current_student_id = localStorage.getItem('loggedInStudent')
        
        if (!current_student_id){
            window.location.href = "index.html";
        }

        const current_student_data = students.filter((i)=>i.studentId === current_student_id)

        console.log(current_student_data)
        const studentName = document.getElementById('studentName')
        const studentId = document.getElementById('studentId')
        const studentImage = document.getElementById('studentImg')

        studentName.textContent = `Welcome, ${current_student_data[0].surname} ${current_student_data[0].firstName}`
        studentId.textContent = `Your Matric Number: ${current_student_data[0].matricNo}`

        studentImage.src = current_student_data[0].passport
    </script>
</body>
</html>
